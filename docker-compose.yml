version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mayavriksh-frontend
    restart: always
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public

      # HTTP router: redirect to HTTPS
      - traefik.http.routers.mayavriksh-frontend-http.rule=(Host(`mayavriksh.in`) || Host(`www.mayavriksh.in`))
      - traefik.http.routers.mayavriksh-frontend-http.entrypoints=http
      - traefik.http.routers.mayavriksh-frontend-http.middlewares=https-redirect

      # HTTPS router: serve frontend (lower priority than backend /api routes)
      - traefik.http.routers.mayavriksh-frontend-https.rule=(Host(`mayavriksh.in`) || Host(`www.mayavriksh.in`))
      - traefik.http.routers.mayavriksh-frontend-https.entrypoints=https
      - traefik.http.routers.mayavriksh-frontend-https.tls=true
      - traefik.http.routers.mayavriksh-frontend-https.tls.certresolver=le
      - traefik.http.routers.mayavriksh-frontend-https.service=mayavriksh-frontend-service
      - traefik.http.routers.mayavriksh-frontend-https.priority=1

      # Service internal port - matches Dockerfile EXPOSE 5000
      - traefik.http.services.mayavriksh-frontend-service.loadbalancer.server.port=5000

    networks:
      - traefik-public

networks:
  traefik-public:
    external: true